services:
  postgres:
    image: postgres:16-alpine
    container_name: ventri-db
    restart: unless-stopped
    ports:
      - "5433:5432"
    environment:
      POSTGRES_USER: ventri
      POSTGRES_PASSWORD: ventri_dev
      POSTGRES_DB: ventri
    volumes:
      - ventri-pgdata:/var/lib/postgresql/data

volumes:
  ventri-pgdata:
